        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      - in: query
        name: student
        schema:
          type: string
          format: uuid
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAbsenceSummaryList'
          description: ''
