components:
  schemas:
    AbsenceSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        student_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        total_sessions:
          type: integer
        present_count:
          type: integer
        absent_count:
          type: integer
        justified_count:
          type: integer
        attendance_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        alert_sent:
          type: boolean
        student:
          type: string
          format: uuid
        course_space:
          type: string
          format: uuid
      required:
      - course_space
      - created_at
      - id
      - student
      - student_name
      - updated_at
    AcademicYear:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        label:
          type: string
          maxLength: 20
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_current:
          type: boolean
        candidature_start:
          type: string
          format: date
          nullable: true
        candidature_end:
          type: string
          format: date
          nullable: true
        admin_enrollment_start:
          type: string
          format: date
          nullable: true
        admin_enrollment_end:
          type: string
          format: date
          nullable: true
        peda_enrollment_start:
          type: string
          format: date
          nullable: true
        peda_enrollment_end:
          type: string
          format: date
          nullable: true
        courses_start:
          type: string
          format: date
          nullable: true
        courses_end:
          type: string
          format: date
          nullable: true
        exams_start:
          type: string
          format: date
          nullable: true
        exams_end:
          type: string
          format: date
          nullable: true
        deliberation_date:
          type: string
          format: date
          nullable: true
      required:
      - created_at
      - end_date
      - id
      - label
      - start_date
      - updated_at
    AcademicYearRequest:
      type: object
      properties:
        is_active:
          type: boolean
        label:
          type: string
          minLength: 1
          maxLength: 20
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_current:
          type: boolean
        candidature_start:
          type: string
          format: date
          nullable: true
        candidature_end:
          type: string
          format: date
          nullable: true
        admin_enrollment_start:
          type: string
          format: date
          nullable: true
        admin_enrollment_end:
          type: string
          format: date
          nullable: true
        peda_enrollment_start:
          type: string
          format: date
          nullable: true
